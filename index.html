<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Koster Golf Club — Atlas Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0a0c09;
  --parchment:#f5f0e8;
  --gold:#b8923a;
  --gold-light:#d4af5a;
  --gold-pale:#e8d5a0;
  --green-deep:#0d2116;
  --green-mid:#1a3d26;
  --green-bright:#2d6e42;
  --cream:#faf7f0;
  --smoke:rgba(10,12,9,0.08);
  --panel:#1a2318;
  --panel-border:rgba(184,146,58,0.2);
}

body{
  background:var(--ink);
  font-family:'DM Mono',monospace;
  color:var(--parchment);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Subtle grain texture overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:1000;
  opacity:0.4;
}

/* ─── TOP HEADER ─────────────────────────────────── */
.header{
  background:linear-gradient(135deg,#0d1a0f 0%, #1a3020 50%, #0d1a0f 100%);
  border-bottom:1px solid var(--panel-border);
  padding:0 24px;
  display:flex;
  align-items:center;
  gap:0;
  height:56px;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.header::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}

.logo-block{
  display:flex;
  flex-direction:column;
  margin-right:32px;
}
.logo-main{
  font-family:'Playfair Display',serif;
  font-size:14px;
  font-weight:700;
  color:var(--gold-light);
  letter-spacing:3px;
  text-transform:uppercase;
  line-height:1;
}
.logo-sub{
  font-size:8px;
  letter-spacing:4px;
  color:rgba(184,146,58,0.5);
  text-transform:uppercase;
  margin-top:2px;
}

.divider{
  width:1px;
  height:32px;
  background:linear-gradient(180deg,transparent,var(--panel-border),transparent);
  margin:0 20px;
  flex-shrink:0;
}

/* Tool groups */
.tool-group{
  display:flex;
  align-items:center;
  gap:3px;
}
.group-label{
  font-size:7px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(184,146,58,0.4);
  margin-right:6px;
  white-space:nowrap;
}

.btn{
  height:32px;
  padding:0 12px;
  border-radius:3px;
  border:1px solid rgba(184,146,58,0.15);
  background:rgba(184,146,58,0.04);
  color:rgba(245,240,232,0.5);
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:all 0.15s ease;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:5px;
}
.btn:hover{
  background:rgba(184,146,58,0.12);
  color:var(--parchment);
  border-color:rgba(184,146,58,0.35);
}
.btn.active{
  background:var(--gold);
  color:var(--ink);
  border-color:var(--gold);
  font-weight:500;
  box-shadow:0 0 12px rgba(184,146,58,0.3);
}
.btn.danger:hover{background:rgba(180,50,40,0.2);color:#e05a4a;border-color:rgba(180,50,40,0.4);}
.btn.success{border-color:rgba(184,146,58,0.4);color:var(--gold-light);}
.btn.success:hover{background:rgba(184,146,58,0.18);color:var(--gold-pale);}

.btn-icon{font-size:12px;}

.header-right{margin-left:auto;}

/* ─── MAIN LAYOUT ────────────────────────────────── */
.workspace{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ─── LEFT PANEL ─────────────────────────────────── */
.panel{
  width:220px;
  min-width:220px;
  background:var(--green-deep);
  border-right:1px solid var(--panel-border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
}

.panel-section{
  padding:16px;
  border-bottom:1px solid rgba(184,146,58,0.1);
}
.panel-title{
  font-size:7px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(184,146,58,0.45);
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.panel-title::after{
  content:'';
  flex:1;
  height:1px;
  background:rgba(184,146,58,0.15);
}

.tool-btn{
  width:100%;
  padding:8px 10px;
  border-radius:3px;
  border:1px solid transparent;
  background:transparent;
  color:rgba(245,240,232,0.45);
  font-family:'DM Mono',monospace;
  font-size:10px;
  cursor:pointer;
  text-align:left;
  transition:all 0.12s;
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:2px;
}
.tool-btn:hover{
  background:rgba(184,146,58,0.08);
  color:var(--parchment);
  border-color:rgba(184,146,58,0.15);
}
.tool-btn.active{
  background:rgba(184,146,58,0.14);
  color:var(--gold-light);
  border-color:rgba(184,146,58,0.3);
}
.tool-icon{
  width:20px;
  height:20px;
  border-radius:2px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  flex-shrink:0;
}

/* Properties panel */
.props-area{
  flex:1;
  overflow-y:auto;
  padding:16px;
}
.props-area::-webkit-scrollbar{width:3px;}
.props-area::-webkit-scrollbar-track{background:transparent;}
.props-area::-webkit-scrollbar-thumb{background:rgba(184,146,58,0.2);border-radius:2px;}

.prop-group{
  margin-bottom:14px;
}
.prop-label{
  font-size:8px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(184,146,58,0.45);
  margin-bottom:5px;
  display:block;
}
.prop-input{
  width:100%;
  padding:6px 9px;
  border-radius:3px;
  border:1px solid rgba(184,146,58,0.15);
  background:rgba(0,0,0,0.3);
  color:var(--parchment);
  font-family:'DM Mono',monospace;
  font-size:11px;
  transition:border-color 0.12s;
}
.prop-input:focus{
  outline:none;
  border-color:rgba(184,146,58,0.45);
}
.prop-row{display:flex;gap:6px;}
.prop-row .prop-input{margin:0;}

.empty-state{
  text-align:center;
  padding:24px 12px;
  color:rgba(245,240,232,0.2);
  font-size:10px;
  line-height:2;
}
.empty-state .es-icon{font-size:24px;margin-bottom:8px;display:block;opacity:0.4;}

.sel-badge{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:rgba(184,146,58,0.12);
  border:1px solid rgba(184,146,58,0.25);
  border-radius:2px;
  padding:3px 8px;
  font-size:9px;
  letter-spacing:1px;
  color:var(--gold-light);
  text-transform:uppercase;
  margin-bottom:14px;
}

/* ─── MAP CANVAS ─────────────────────────────────── */
.canvas-area{
  flex:1;
  overflow:auto;
  background:#060e07;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
  position:relative;
}

/* Subtle dot grid */
.canvas-area::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:radial-gradient(circle, rgba(184,146,58,0.08) 1px, transparent 1px);
  background-size:24px 24px;
  pointer-events:none;
}

#mapSvg{
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  border-radius:6px;
  box-shadow:0 0 0 1px rgba(184,146,58,0.15), 0 32px 80px rgba(0,0,0,0.8), 0 0 60px rgba(45,110,66,0.08);
  position:relative;
  z-index:1;
}

.draggable{cursor:grab;}
.hit{fill:transparent;opacity:0;}
.selected-el .hit{fill:rgba(255,255,255,0.07);opacity:1;}
.selected-el{filter:drop-shadow(0 0 6px rgba(184,146,58,0.5));}

/* ─── STATUS BAR ─────────────────────────────────── */
.statusbar{
  background:var(--green-deep);
  border-top:1px solid var(--panel-border);
  padding:6px 20px;
  display:flex;
  align-items:center;
  gap:20px;
  font-size:9px;
  letter-spacing:1px;
  color:rgba(245,240,232,0.3);
  flex-shrink:0;
  height:30px;
}
.status-item{display:flex;align-items:center;gap:6px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green-bright);}
.status-dot.warn{background:#c9a84c;}
#statusMsg{color:rgba(184,146,58,0.7);margin-left:auto;}

/* ─── SCROLLBAR ──────────────────────────────────── */
.canvas-area::-webkit-scrollbar{width:6px;height:6px;}
.canvas-area::-webkit-scrollbar-track{background:transparent;}
.canvas-area::-webkit-scrollbar-thumb{background:rgba(184,146,58,0.15);border-radius:3px;}

/* ─── TOOLTIP ────────────────────────────────────── */
.tooltip{
  position:fixed;
  background:rgba(10,12,9,0.92);
  border:1px solid rgba(184,146,58,0.3);
  border-radius:3px;
  padding:5px 10px;
  font-size:10px;
  color:var(--gold-pale);
  pointer-events:none;
  z-index:9999;
  opacity:0;
  transition:opacity 0.15s;
  letter-spacing:0.5px;
}
.tooltip.show{opacity:1;}

/* ─── MODAL DIALOGS ──────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(6,14,7,0.85);
  display:flex;align-items:center;justify-content:center;
  z-index:8888;
  backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--green-deep);
  border:1px solid var(--panel-border);
  border-radius:6px;
  padding:28px;
  min-width:280px;
  box-shadow:0 40px 80px rgba(0,0,0,0.8);
}
.modal h2{
  font-family:'Playfair Display',serif;
  font-size:18px;
  color:var(--gold-light);
  margin-bottom:6px;
}
.modal p{font-size:10px;color:rgba(245,240,232,0.4);margin-bottom:20px;letter-spacing:0.5px;line-height:1.8;}
.modal-input{
  width:100%;padding:10px 12px;
  border-radius:3px;border:1px solid rgba(184,146,58,0.25);
  background:rgba(0,0,0,0.4);color:var(--parchment);
  font-family:'DM Mono',monospace;font-size:14px;
  margin-bottom:16px;
}
.modal-input:focus{outline:none;border-color:var(--gold);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}

/* ─── SELECTION PULSE RING ───────────────────────── */
@keyframes pulse-ring {
  0%{transform:scale(1);opacity:0.6;}
  100%{transform:scale(1.4);opacity:0;}
}
</style>
</head>
<body>

<!-- ════════ HEADER ════════ -->
<div class="header">
  <div class="logo-block">
    <div class="logo-main">Koster Golf Club</div>
    <div class="logo-sub">Atlas Map Editor · 9 Holes</div>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <span class="group-label">Mode</span>
    <button class="btn active" id="btnMove"  onclick="setMode('move')"><span class="btn-icon">✋</span>Move</button>
    <button class="btn" id="btnShape" onclick="setMode('shape')"><span class="btn-icon">✏️</span>Edit Course</button>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <span class="group-label">Place</span>
    <button class="btn" id="btnHole"   onclick="setMode('hole')"><span class="btn-icon">①</span>Hole</button>
    <button class="btn" id="btnGreen"  onclick="setMode('green')"><span class="btn-icon">⛳</span>Green</button>
    <button class="btn" id="btnBunker" onclick="setMode('bunker')"><span class="btn-icon">◯</span>Bunker</button>
    <button class="btn" id="btnDam"    onclick="setMode('dam')"><span class="btn-icon">💧</span>Dam</button>
    <button class="btn" id="btnRiver"  onclick="setMode('river')"><span class="btn-icon">〰</span>River</button>
    <button class="btn" id="btnRoad"   onclick="setMode('road')"><span class="btn-icon">—</span>Road</button>
    <button class="btn" id="btnPark"   onclick="setMode('park')"><span class="btn-icon">P</span>Parking</button>
    <button class="btn" id="btnRough"  onclick="setMode('rough')"><span class="btn-icon">🌿</span>Rough</button>
    <button class="btn" id="btnTree"   onclick="setMode('tree')"><span class="btn-icon">🌲</span>Trees</button>
    <button class="btn" id="btnArrow"  onclick="setMode('arrow')"><span class="btn-icon">→</span>Play Line</button>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <button class="btn danger" onclick="deleteSelected()"><span class="btn-icon">✕</span>Delete</button>
    <button class="btn success" onclick="copyCode()"><span class="btn-icon">↗</span>Export SVG</button>
  </div>
</div>

<!-- ════════ WORKSPACE ════════ -->
<div class="workspace">

  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="panel-section">
      <div class="panel-title">Properties</div>
      <div id="propPanel">
        <div class="empty-state">
          <span class="es-icon">◎</span>
          Select any element<br>on the map to edit<br>its properties.
        </div>
      </div>
    </div>

    <div class="panel-section" style="border-bottom:none;">
      <div class="panel-title">Elements</div>

      <button class="tool-btn" onclick="setMode('hole')">
        <div class="tool-icon" style="background:rgba(184,146,58,0.15);color:var(--gold);">①</div>
        Hole Number
      </button>
      <button class="tool-btn" onclick="setMode('green')">
        <div class="tool-icon" style="background:rgba(45,110,66,0.3);color:#5dcc6a;">⛳</div>
        Green + Flag
      </button>
      <button class="tool-btn" onclick="setMode('bunker')">
        <div class="tool-icon" style="background:rgba(200,176,80,0.2);color:#d4b84a;">◯</div>
        Sand Bunker
      </button>
      <button class="tool-btn" onclick="setMode('dam')">
        <div class="tool-icon" style="background:rgba(60,130,200,0.2);color:#5bb8e0;">💧</div>
        Water / Dam
      </button>
      <button class="tool-btn" onclick="setMode('river')">
        <div class="tool-icon" style="background:rgba(60,130,200,0.15);color:#4aaad0;">〰</div>
        River (2 pts)
      </button>
      <button class="tool-btn" onclick="setMode('road')">
        <div class="tool-icon" style="background:rgba(140,100,60,0.2);color:#a07040;">—</div>
        Dirt Road (2 pts)
      </button>
      <button class="tool-btn" onclick="setMode('park')">
        <div class="tool-icon" style="background:rgba(60,60,60,0.3);color:var(--gold);">P</div>
        Parking Lot
      </button>
      <button class="tool-btn" onclick="setMode('rough')">
        <div class="tool-icon" style="background:rgba(20,60,25,0.5);color:#3a8040;">▣</div>
        Rough Patch
      </button>
      <button class="tool-btn" onclick="setMode('tree')">
        <div class="tool-icon" style="background:rgba(20,60,25,0.4);color:#2d6e42;">🌲</div>
        Tree Cluster
      </button>
      <button class="tool-btn" onclick="setMode('arrow')">
        <div class="tool-icon" style="background:rgba(184,146,58,0.1);color:var(--gold);">→</div>
        Play Direction
      </button>
    </div>
  </div>

  <!-- MAP CANVAS -->
  <div class="canvas-area">
    <svg id="mapSvg" viewBox="0 0 560 830" width="560" height="830">
      <defs>
        <!-- Gradients -->
        <linearGradient id="fwG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#3da04e"/>
          <stop offset="50%" style="stop-color:#2d7a3e"/>
          <stop offset="100%" style="stop-color:#1f5c2c"/>
        </linearGradient>
        <linearGradient id="roughG" x1="0%" y1="0%" x2="10%" y2="100%">
          <stop offset="0%" style="stop-color:#163322"/>
          <stop offset="100%" style="stop-color:#0c2016"/>
        </linearGradient>
        <radialGradient id="rpG" cx="40%" cy="40%">
          <stop offset="0%" style="stop-color:#183d20"/>
          <stop offset="100%" style="stop-color:#0c2010"/>
        </radialGradient>
        <radialGradient id="bunkerG" cx="35%" cy="35%">
          <stop offset="0%" style="stop-color:#f2e8a0"/>
          <stop offset="60%" style="stop-color:#d4b84a"/>
          <stop offset="100%" style="stop-color:#b89030"/>
        </radialGradient>
        <linearGradient id="damG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#68c8f0"/>
          <stop offset="100%" style="stop-color:#1e6898"/>
        </linearGradient>
        <linearGradient id="riverG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#50b8e0"/>
          <stop offset="100%" style="stop-color:#1e70a8"/>
        </linearGradient>
        <linearGradient id="roadG" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#8b6a40"/>
          <stop offset="100%" style="stop-color:#6b4e2c"/>
        </linearGradient>
        <linearGradient id="borderG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#b8923a"/>
          <stop offset="50%" style="stop-color:#d4af5a"/>
          <stop offset="100%" style="stop-color:#8a6a28"/>
        </linearGradient>

        <!-- Filters -->
        <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="rgba(0,0,0,0.6)"/>
        </filter>
        <filter id="lsh" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.9)"/>
        </filter>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Patterns -->
        <pattern id="fairwayStripe" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
          <rect width="24" height="24" fill="transparent"/>
          <rect width="12" height="24" fill="rgba(255,255,255,0.018)"/>
        </pattern>

        <!-- Arrow marker -->
        <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 Z" fill="rgba(184,146,58,0.8)"/>
        </marker>
        <marker id="arrowHeadSel" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L10,3.5 Z" fill="rgba(220,180,80,1)"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="560" height="830" fill="#091409" rx="6"/>
      <!-- Very subtle texture lines -->
      <g opacity="0.04">
        <line x1="0" y1="100" x2="560" y2="100" stroke="#4a8" stroke-width="0.5"/>
        <line x1="0" y1="200" x2="560" y2="200" stroke="#4a8" stroke-width="0.5"/>
        <line x1="0" y1="300" x2="560" y2="300" stroke="#4a8" stroke-width="0.5"/>
        <line x1="0" y1="400" x2="560" y2="400" stroke="#4a8" stroke-width="0.5"/>
        <line x1="0" y1="500" x2="560" y2="500" stroke="#4a8" stroke-width="0.5"/>
        <line x1="0" y1="600" x2="560" y2="600" stroke="#4a8" stroke-width="0.5"/>
        <line x1="0" y1="700" x2="560" y2="700" stroke="#4a8" stroke-width="0.5"/>
        <line x1="0" y1="800" x2="560" y2="800" stroke="#4a8" stroke-width="0.5"/>
        <line x1="100" y1="0" x2="100" y2="830" stroke="#4a8" stroke-width="0.5"/>
        <line x1="200" y1="0" x2="200" y2="830" stroke="#4a8" stroke-width="0.5"/>
        <line x1="300" y1="0" x2="300" y2="830" stroke="#4a8" stroke-width="0.5"/>
        <line x1="400" y1="0" x2="400" y2="830" stroke="#4a8" stroke-width="0.5"/>
        <line x1="500" y1="0" x2="500" y2="830" stroke="#4a8" stroke-width="0.5"/>
      </g>

      <!-- Course shapes -->

        <!-- Items -->
        <rect x="12" y="23" width="14" height="9" rx="2" fill="#2d7a3e"/>
        <text x="32" y="31" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Fairway</text>
        <ellipse cx="19" cy="46" rx="8" ry="5" fill="#142a1e"/>
        <text x="32" y="50" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Rough</text>
        <ellipse cx="19" cy="64" rx="9" ry="6" fill="#4dc460"/>
        <line x1="19" y1="58" x2="19" y2="51" stroke="white" stroke-width="1.2"/>
        <polygon points="19,51 25,54 19,57" fill="#d43020"/>
        <text x="32" y="68" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Green/Flag</text>
        <ellipse cx="19" cy="83" rx="9" ry="6" fill="#d4b84a"/>
        <text x="32" y="87" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Sand Bunker</text>

        <text x="32" y="104" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Dam/River</text>
        <rect x="12" y="110" width="14" height="8" rx="2" fill="#6b4e2c"/>
        <text x="32" y="118" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Dirt Road</text>
        <rect x="12" y="124" width="14" height="8" rx="2" fill="#1e1a16" stroke="rgba(184,146,58,0.3)" stroke-width="1"/>
        <text x="32" y="132" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Parking</text>
        <line x1="12" y1="146" x2="26" y2="146" stroke="rgba(184,146,58,0.7)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowHead)"/>
        <text x="32" y="150" font-family="'DM Mono',monospace" font-size="9" fill="rgba(245,240,232,0.6)">Play Line</text>
        <line x1="10" y1="166" x2="138" y2="166" stroke="url(#borderG)" stroke-width="1" opacity="0.4"/>

      <!-- ════ TITLE BLOCK ════ -->
      <g>

        <line x1="10" y1="10" x2="350" y2="10" stroke="url(#borderG)" stroke-width="1.5" opacity="0.7"/>
        <text x="22" y="26" font-family="'Playfair Display',serif" font-size="11" fill="rgba(184,146,58,0.55)" letter-spacing="3">KOSTER</text>
        <text x="72" y="26" font-family="'Playfair Display',serif" font-size="11" fill="rgba(184,146,58,0.3)" letter-spacing="1">GOLF CLUB</text>

        <line x1="220" y1="20" x2="220" y2="34" stroke="rgba(184,146,58,0.2)" stroke-width="1"/>
        <text x="228" y="26" font-family="'DM Mono',monospace" font-size="9" fill="rgba(184,146,58,0.4)" letter-spacing="1">EST. 1994</text>

      <!-- ════ COMPASS ════ -->

        <!-- N arrow -->
        <polygon points="0,-20 -4,-6 4,-6" fill="var(--gold)"/>
        <polygon points="0,20 -4,6 4,6" fill="rgba(184,146,58,0.22)"/>
        <!-- Crosshairs -->
        <line x1="-18" y1="0" x2="-10" y2="0" stroke="rgba(184,146,58,0.3)" stroke-width="0.5"/>
        <line x1="10" y1="0" x2="18" y2="0" stroke="rgba(184,146,58,0.3)" stroke-width="0.5"/>
        <text y="-8" font-family="'Playfair Display',serif" font-size="10" fill="var(--gold-light)" text-anchor="middle" font-weight="bold">N</text>
        <text y="17" font-family="'DM Mono',monospace" font-size="7" fill="rgba(184,146,58,0.3)" text-anchor="middle">S</text>
        <text x="-14" y="3" font-family="'DM Mono',monospace" font-size="7" fill="rgba(184,146,58,0.3)" text-anchor="middle">W</text>
        <text x="14" y="3" font-family="'DM Mono',monospace" font-size="7" fill="rgba(184,146,58,0.3)" text-anchor="middle">E</text>
      </g>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="status-item"><div class="status-dot"></div>Ready</div>
  <div class="status-item" style="color:rgba(245,240,232,0.2);">·</div>
  <div class="status-item" id="modeIndicator">Mode: <span style="color:var(--gold-light);">Move</span></div>
  <div class="status-item" style="color:rgba(245,240,232,0.2);">·</div>
  <div class="status-item">9 holes</div>
  <span id="statusMsg"></span>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Hole Number Modal -->
<div class="modal-overlay" id="holeModal">
  <div class="modal">
    <h2>Add Hole Number</h2>
    <p>Enter the hole number to place on the map.</p>
    <input class="modal-input" id="holeInput" type="number" min="1" max="18" value="1" placeholder="Hole number…"/>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn success" onclick="confirmHole()" style="border-color:var(--gold)">Place</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// COURSE SHAPE POINTS
// ═══════════════════════════════════════════════════════
const SP = [
  {x:105,y:228},{x:55,y:238},{x:40,y:310},{x:53,y:378},{x:84,y:420},
  {x:136,y:438},{x:176,y:452},{x:182,y:532},
  {x:184,y:560},{x:187,y:597},{x:190,y:637},{x:194,y:675},{x:198,y:712},
  {x:203,y:744},{x:210,y:772},{x:230,y:812},{x:260,y:825},{x:290,y:810},
  {x:308,y:767},{x:314,y:740},{x:319,y:708},{x:323,y:672},{x:326,y:634},
  {x:329,y:596},{x:331,y:560},{x:333,y:532},
  {x:362,y:532},{x:408,y:438},{x:458,y:420},{x:488,y:378},{x:499,y:310},
  {x:483,y:240},{x:456,y:214},{x:390,y:199},{x:318,y:194},{x:258,y:193},
  {x:202,y:196},{x:140,y:208},
];

function buildPath(pts, insetPx) {
  let p = pts;
  if (insetPx) {
    const cx = pts.reduce((s,pt)=>s+pt.x,0)/pts.length;
    const cy = pts.reduce((s,pt)=>s+pt.y,0)/pts.length;
    p = pts.map(pt=>{
      const dx=pt.x-cx,dy=pt.y-cy,d=Math.sqrt(dx*dx+dy*dy)||1;
      return {x:pt.x-dx/d*insetPx,y:pt.y-dy/d*insetPx};
    });
  }
  return 'M '+p.map(pt=>`${pt.x.toFixed(1)},${pt.y.toFixed(1)}`).join(' L ')+' Z';
}

function rebuildPaths(){
  document.getElementById('pathRough').setAttribute('d', buildPath(SP,0));
  const fw = buildPath(SP,14);
  document.getElementById('pathFairway').setAttribute('d', fw);
  document.getElementById('pathPattern').setAttribute('d', fw);
  document.getElementById('pathInner').setAttribute('d', buildPath(SP,28));
  document.getElementById('pathStripe1')?.setAttribute('d',
    `M${SP[3].x},${SP[3].y} L${SP[4].x},${SP[4].y} L${SP[5].x},${SP[5].y} L${SP[7].x},${SP[7].y}`);
}

// ═══════════════════════════════════════════════════════
// SHAPE HANDLES
// ═══════════════════════════════════════════════════════
let activeHandle = null, handleOffX=0, handleOffY=0;

function buildHandles(){
  const layer = document.getElementById('shapeHandles');
  layer.innerHTML = '';
  SP.forEach((pt,i)=>{
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'move';
    g.innerHTML =
      `<circle cx="${pt.x}" cy="${pt.y}" r="12" fill="rgba(0,0,0,0.6)" stroke="rgba(184,146,58,0.9)" stroke-width="2"/>
       <circle cx="${pt.x}" cy="${pt.y}" r="5" fill="#d4af5a"/>`;
    g.addEventListener('mousedown',e=>{
      e.stopPropagation(); e.preventDefault();
      activeHandle=i;
      const sp=svgPt(e);
      handleOffX=sp.x-pt.x; handleOffY=sp.y-pt.y;
    });
    layer.appendChild(g);
  });
}

function updateHandlePos(i){
  const g = document.getElementById('shapeHandles').children[i];
  if(!g)return;
  g.querySelectorAll('circle').forEach(c=>{
    c.setAttribute('cx',SP[i].x); c.setAttribute('cy',SP[i].y);
  });
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let mode='move', dragging=null, dragOX=0, dragOY=0;
let selected=null, idC=200;
let linePhase=false, lineStart=null;
let pendingHoleX=0, pendingHoleY=0;

const svg = document.getElementById('mapSvg');
const overlay = document.getElementById('placementOverlay');
const handles = document.getElementById('shapeHandles');
const previewLine = document.getElementById('previewLine');
const tooltip = document.getElementById('tooltip');

// ═══════════════════════════════════════════════════════
// MOUSE EVENTS ON SVG
// ═══════════════════════════════════════════════════════
svg.addEventListener('mousemove', e=>{
  e.preventDefault();
  const p = svgPt(e);

  // Update preview line
  if(linePhase && lineStart){
    previewLine.setAttribute('x1',lineStart.x);
    previewLine.setAttribute('y1',lineStart.y);
    previewLine.setAttribute('x2',p.x);
    previewLine.setAttribute('y2',p.y);
  }

  if(activeHandle!==null){
    SP[activeHandle].x = Math.round(p.x - handleOffX);
    SP[activeHandle].y = Math.round(p.y - handleOffY);
    rebuildPaths();
    updateHandlePos(activeHandle);
    return;
  }
  if(!dragging)return;
  const nx=Math.round(p.x-dragOX), ny=Math.round(p.y-dragOY);
  dragging.setAttribute('transform',`translate(${nx},${ny})`);
  const px=document.getElementById('px'),py=document.getElementById('py');
  if(px)px.value=nx;
  if(py)py.value=ny;
});

svg.addEventListener('mouseup',()=>{dragging=null;activeHandle=null;});
svg.addEventListener('mouseleave',()=>{dragging=null;activeHandle=null;});

// ═══════════════════════════════════════════════════════
// PLACEMENT OVERLAY
// ═══════════════════════════════════════════════════════
overlay.addEventListener('click',e=>{
  const p=svgPt(e);
  placeAt(p.x,p.y);
});

overlay.addEventListener('mousemove',e=>{
  const p=svgPt(e);
  if(linePhase && lineStart){
    previewLine.setAttribute('x2',p.x);
    previewLine.setAttribute('y2',p.y);
  }
});

function placeAt(x,y){
  if(mode==='river'||mode==='road'||mode==='arrow'){
    if(!linePhase){
      linePhase=true; lineStart={x,y};
      previewLine.setAttribute('x1',x); previewLine.setAttribute('y1',y);
      previewLine.setAttribute('x2',x); previewLine.setAttribute('y2',y);
      previewLine.style.display='';
      setStatus('Click the END point to complete the '+mode);
      return;
    }
    const id='el_'+(++idC);
    const el=mode==='river'?mkRiver(id,lineStart,{x,y})
            :mode==='road' ?mkRoad(id,lineStart,{x,y})
            :mkArrow(id,lineStart,{x,y});
    addEl(el); linePhase=false; lineStart=null;
    previewLine.style.display='none';
    setMode('move'); selectEl(el);
    return;
  }
  if(mode==='hole'){
    pendingHoleX=x; pendingHoleY=y;
    openModal();
    return;
  }
  const id='el_'+(++idC);
  let el=null;
  if(mode==='green')  el=mkGreen(id,x,y);
  else if(mode==='bunker') el=mkBunker(id,x,y);
  else if(mode==='dam')    el=mkDam(id,x,y);
  else if(mode==='park')   el=mkPark(id,x,y);
  else if(mode==='rough')  el=mkRough(id,x,y);
  else if(mode==='tree')   el=mkTree(id,x,y);
  if(el){addEl(el);selectEl(el);setMode('move');}
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(){
  document.getElementById('holeModal').classList.add('show');
  setTimeout(()=>document.getElementById('holeInput').focus(),100);
}
function closeModal(){
  document.getElementById('holeModal').classList.remove('show');
  setMode('move');
}
function confirmHole(){
  const n=document.getElementById('holeInput').value;
  if(!n){return;}
  const id='el_'+(++idC);
  const el=mkHole(id,n,pendingHoleX,pendingHoleY);
  addEl(el); selectEl(el);
  closeModal();
}
document.getElementById('holeInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')confirmHole();
  if(e.key==='Escape')closeModal();
});
document.getElementById('holeModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('holeModal'))closeModal();
});

// ═══════════════════════════════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════════════════════════════
function setMode(m){
  mode=m; linePhase=false; lineStart=null; activeHandle=null;
  previewLine.style.display='none';

  // Update header buttons
  document.querySelectorAll('.btn[id^=btn]').forEach(b=>b.classList.remove('active'));
  const bid='btn'+m[0].toUpperCase()+m.slice(1);
  const btn=document.getElementById(bid);
  if(btn)btn.classList.add('active');

  // Update sidebar tool buttons
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));

  const modeLabels={
    move:'Move',shape:'Edit Course Outline',
    hole:'Place Hole Number',green:'Place Green + Flag',bunker:'Place Sand Bunker',
    dam:'Place Dam / Water',river:'River — click start…',road:'Road — click start…',
    park:'Place Parking Lot',rough:'Place Rough Patch',tree:'Place Tree Cluster',
    arrow:'Play Line — click start…'
  };
  document.getElementById('modeIndicator').innerHTML=
    `Mode: <span style="color:var(--gold-light);">${modeLabels[m]||m}</span>`;
  setStatus(
    m==='move'?'Drag elements to reposition them':
    m==='shape'?'Drag yellow dots to reshape the course outline':
    m==='river'||m==='road'||m==='arrow'?'Click the START point on the map':
    'Click anywhere on the map to place'
  );

  const isPlacing=(m!=='move'&&m!=='shape');
  overlay.style.display=isPlacing?'':'none';
  handles.style.display=(m==='shape')?'':'none';
  svg.style.cursor=isPlacing?'crosshair':'default';
  if(m==='shape')buildHandles();
}

// ═══════════════════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════════════════
function startDrag(e,el){
  if(mode!=='move')return;
  e.stopPropagation();
  selectEl(el);
  const p=svgPt(e),t=getTr(el);
  dragOX=p.x-t.x; dragOY=p.y-t.y;
  dragging=el;
}

function addEl(el){
  document.getElementById('elemLayer').appendChild(el);
  el.addEventListener('mousedown',ev=>startDrag(ev,el));
  // Hover tooltip
  el.addEventListener('mouseenter',e=>{
    const type=(el.getAttribute('data-type')||'').replace(/^\w/,c=>c.toUpperCase());
    showTip(e,type);
  });
  el.addEventListener('mousemove',e=>moveTip(e));
  el.addEventListener('mouseleave',()=>hideTip());
}

// Wire existing elements
document.querySelectorAll('#elemLayer .draggable').forEach(el=>{
  el.addEventListener('mousedown',ev=>startDrag(ev,el));
  const type=(el.getAttribute('data-type')||'').replace(/^\w/,c=>c.toUpperCase());
  el.addEventListener('mouseenter',e=>showTip(e,type));
  el.addEventListener('mousemove',e=>moveTip(e));
  el.addEventListener('mouseleave',()=>hideTip());
});

// ═══════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════
function showTip(e,text){
  tooltip.textContent=text;
  tooltip.classList.add('show');
  moveTip(e);
}
function moveTip(e){
  tooltip.style.left=(e.clientX+14)+'px';
  tooltip.style.top=(e.clientY-24)+'px';
}
function hideTip(){tooltip.classList.remove('show');}

// ═══════════════════════════════════════════════════════
// ELEMENT FACTORIES
// ═══════════════════════════════════════════════════════
function ns(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function mkG(type,id,x,y){
  const g=ns('g');
  g.setAttribute('class','draggable');
  g.setAttribute('data-type',type);
  g.setAttribute('data-id',id);
  g.setAttribute('transform',`translate(${Math.round(x)},${Math.round(y)})`);
  return g;
}
function mkHole(id,num,x,y){
  const g=mkG('hole',id,x,y);
  g.setAttribute('data-num',num);
  g.innerHTML=`<circle r="19" fill="#0a1a0c" stroke="url(#borderG)" stroke-width="2.5" filter="url(#lsh)"/><circle r="15" fill="none" stroke="rgba(184,146,58,0.2)" stroke-width="0.5"/><text dy="5" font-family="'Playfair Display',serif" font-size="14" fill="#e8d5a0" text-anchor="middle" font-weight="700">${num}</text><circle class="hit" r="22" fill="transparent"/>`;
  return g;
}
function mkGreen(id,x,y){
  const g=mkG('green',id,x,y);
  g.innerHTML=`<ellipse rx="23" ry="15" fill="#4dc460" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/><ellipse rx="19" ry="11" fill="rgba(255,255,255,0.06)"/><line x1="0" y1="0" x2="0" y2="-22" stroke="white" stroke-width="1.5"/><polygon points="0,-22 14,-16 0,-10" fill="#d43020"/><rect class="hit" x="-24" y="-23" width="48" height="38" rx="4"/>`;
  return g;
}
function mkBunker(id,x,y){
  const g=mkG('bunker',id,x,y);
  g.innerHTML=`<ellipse rx="26" ry="17" fill="url(#bunkerG)" opacity="0.92"/><ellipse rx="20" ry="12" fill="rgba(255,245,180,0.12)"/><rect class="hit" x="-27" y="-18" width="54" height="36" rx="4"/>`;
  return g;
}
function mkDam(id,x,y){
  const g=mkG('dam',id,x,y);
  g.innerHTML=`<ellipse rx="30" ry="40" fill="url(#damG)" opacity="0.9"/><ellipse rx="20" ry="28" fill="rgba(180,240,255,0.15)"/><ellipse rx="10" ry="14" fill="rgba(220,250,255,0.12)"/><text dy="4" font-family="sans-serif" font-size="13" fill="rgba(200,245,255,0.85)" text-anchor="middle">💧</text><text dy="20" font-family="'DM Mono',monospace" font-size="6.5" fill="rgba(180,230,255,0.5)" text-anchor="middle" letter-spacing="1">DAM</text><rect class="hit" x="-31" y="-41" width="62" height="82" rx="6"/>`;
  return g;
}
function mkRiver(id,s,e){
  const g=mkG('river',id,0,0);
  const mx=(s.x+e.x)/2+(Math.random()-.5)*40, my=(s.y+e.y)/2+(Math.random()-.5)*40;
  g.innerHTML=`<path d="M${r(s.x)},${r(s.y)} Q${r(mx)},${r(my)} ${r(e.x)},${r(e.y)}" stroke="url(#riverG)" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.85"/><path d="M${r(s.x)},${r(s.y)} Q${r(mx)},${r(my)} ${r(e.x)},${r(e.y)}" stroke="rgba(180,230,255,0.25)" stroke-width="4" fill="none" stroke-linecap="round"/><rect class="hit" x="${Math.min(s.x,e.x)-12}" y="${Math.min(s.y,e.y)-12}" width="${Math.abs(e.x-s.x)+24}" height="${Math.abs(e.y-s.y)+24}" rx="4"/>`;
  return g;
}
function mkRoad(id,s,e){
  const g=mkG('road',id,0,0);
  const mx=(s.x+e.x)/2, my=(s.y+e.y)/2;
  g.innerHTML=`<path d="M${r(s.x)},${r(s.y)} Q${r(mx)},${r(my)} ${r(e.x)},${r(e.y)}" stroke="url(#roadG)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.88"/><path d="M${r(s.x)},${r(s.y)} Q${r(mx)},${r(my)} ${r(e.x)},${r(e.y)}" stroke="rgba(220,180,100,0.2)" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="10,8"/><rect class="hit" x="${Math.min(s.x,e.x)-12}" y="${Math.min(s.y,e.y)-12}" width="${Math.abs(e.x-s.x)+24}" height="${Math.abs(e.y-s.y)+24}" rx="4"/>`;
  return g;
}
function mkPark(id,x,y){
  const g=mkG('park',id,x,y);
  g.innerHTML=`<rect x="-34" y="-24" width="68" height="48" rx="3" fill="#1e1a16" stroke="rgba(184,146,58,0.4)" stroke-width="1.5"/><line x1="-22" y1="-20" x2="-22" y2="20" stroke="rgba(255,255,255,0.12)" stroke-width="1"/><line x1="-10" y1="-20" x2="-10" y2="20" stroke="rgba(255,255,255,0.12)" stroke-width="1"/><line x1="2" y1="-20" x2="2" y2="20" stroke="rgba(255,255,255,0.12)" stroke-width="1"/><line x1="14" y1="-20" x2="14" y2="20" stroke="rgba(255,255,255,0.12)" stroke-width="1"/><text dy="5" font-family="'Playfair Display',serif" font-size="11" fill="rgba(184,146,58,0.8)" text-anchor="middle" font-weight="bold">P</text><rect class="hit" x="-35" y="-25" width="70" height="50" rx="4"/>`;
  return g;
}
function mkRough(id,x,y){
  const g=mkG('rough',id,x,y);
  g.innerHTML=`<ellipse rx="46" ry="33" fill="url(#rpG)" opacity="0.82"/><ellipse rx="40" ry="28" fill="none" stroke="rgba(100,180,100,0.05)" stroke-width="1"/><rect class="hit" x="-47" y="-34" width="94" height="68" rx="4"/>`;
  return g;
}
function mkTree(id,x,y){
  const g=mkG('tree',id,x,y);
  g.innerHTML=`<circle r="14" fill="#0f2e14" opacity="0.9"/><circle cx="11" cy="-7" r="10" fill="#112e15" opacity="0.72"/><circle cx="-9" cy="-7" r="8" fill="#163a1a" opacity="0.62"/><circle r="7" fill="#1a4820" opacity="0.45"/><rect class="hit" x="-23" y="-20" width="46" height="40" rx="4"/>`;
  return g;
}
function mkArrow(id,s,e){
  const g=mkG('arrow',id,0,0);
  const mx=(s.x+e.x)/2+(Math.random()-.5)*20, my=(s.y+e.y)/2+(Math.random()-.5)*20;
  g.innerHTML=`<path d="M${r(s.x)},${r(s.y)} Q${r(mx)},${r(my)} ${r(e.x)},${r(e.y)}" stroke="rgba(184,146,58,0.55)" stroke-width="2" fill="none" stroke-dasharray="8,6" marker-end="url(#arrowHead)"/><rect class="hit" x="${Math.min(s.x,e.x)-12}" y="${Math.min(s.y,e.y)-12}" width="${Math.abs(e.x-s.x)+24}" height="${Math.abs(e.y-s.y)+24}" rx="4"/>`;
  return g;
}
function r(v){return Math.round(v);}

// ═══════════════════════════════════════════════════════
// SELECTION & PROPERTIES
// ═══════════════════════════════════════════════════════
function selectEl(el){
  if(selected)selected.classList.remove('selected-el');
  selected=el;
  el.classList.add('selected-el');
  showProps(el);
}

function showProps(el){
  const type=(el.getAttribute('data-type')||'').toUpperCase();
  const t=getTr(el);
  let h=`<div class="sel-badge">▸ ${type}</div>`;
  h+=`<div class="prop-group"><span class="prop-label">Position X / Y</span><div class="prop-row"><input type="number" class="prop-input" id="px" value="${Math.round(t.x)}" oninput="applyPos()"/><input type="number" class="prop-input" id="py" value="${Math.round(t.y)}" oninput="applyPos()"/></div></div>`;
  if(type==='HOLE'){
    h+=`<div class="prop-group"><span class="prop-label">Hole Number</span><input type="number" min="1" max="18" class="prop-input" id="hnum" value="${el.getAttribute('data-num')}" oninput="applyNum()"/></div>`;
  }
  h+=`<button class="btn danger" style="width:100%;justify-content:center;margin-top:4px;" onclick="deleteSelected()"><span class="btn-icon">✕</span>Delete Element</button>`;
  document.getElementById('propPanel').innerHTML=h;
}

function applyPos(){
  if(!selected)return;
  const x=document.getElementById('px')?.value,y=document.getElementById('py')?.value;
  if(x!==''&&y!=='')selected.setAttribute('transform',`translate(${x},${y})`);
}
function applyNum(){
  if(!selected)return;
  const n=document.getElementById('hnum')?.value;
  if(!n)return;
  selected.setAttribute('data-num',n);
  const t=selected.querySelector('text');
  if(t)t.textContent=n;
}
function deleteSelected(){
  if(!selected)return;
  selected.remove();selected=null;
  document.getElementById('propPanel').innerHTML=`<div class="empty-state"><span class="es-icon">◎</span>Select any element<br>on the map to edit<br>its properties.</div>`;
  setStatus('Element deleted');
}
document.addEventListener('keydown',e=>{
  if((e.key==='Delete'||e.key==='Backspace')&&selected&&document.activeElement.tagName!=='INPUT')deleteSelected();
  if(e.key==='Escape'){setMode('move');closeModal();}
});

// Click on canvas background deselects
svg.addEventListener('mousedown',e=>{
  if(e.target===svg||e.target.tagName==='rect'&&e.target.getAttribute('fill')==='#091409'){
    if(selected){selected.classList.remove('selected-el');selected=null;}
    document.getElementById('propPanel').innerHTML=`<div class="empty-state"><span class="es-icon">◎</span>Select any element<br>on the map to edit<br>its properties.</div>`;
  }
});

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getTr(el){
  const m=(el.getAttribute('transform')||'').match(/translate\(([^,]+),([^)]+)\)/);
  return m?{x:parseFloat(m[1]),y:parseFloat(m[2])}:{x:0,y:0};
}
function svgPt(e){
  const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function setStatus(msg){
  document.getElementById('statusMsg').textContent=msg;
}

// ═══════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════
function copyCode(){
  // Clean state for export
  overlay.style.display='none';
  handles.style.display='none';
  previewLine.style.display='none';
  if(selected)selected.classList.remove('selected-el');

  const str = new XMLSerializer().serializeToString(svg);

  // Restore state
  const isPlacing=(mode!=='move'&&mode!=='shape');
  if(isPlacing)overlay.style.display='';
  if(mode==='shape')handles.style.display='';
  if(selected)selected.classList.add('selected-el');

  navigator.clipboard.writeText(str)
    .then(()=>setStatus('✓ SVG exported to clipboard — paste into your project'))
    .catch(()=>{
      const ta=document.createElement('textarea');
      ta.value=str;document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
      setStatus('✓ SVG copied to clipboard');
    });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
rebuildPaths();
setStatus('Ready — select a tool to begin editing');
</script>
